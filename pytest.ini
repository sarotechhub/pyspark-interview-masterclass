[pytest]
# PyTest Configuration

# Minimum Python version
minversion = 3.8

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Spark Session scope for fixtures
addopts = 
    -v
    --tb=short
    --strict-markers

# Output options
testpaths = tests

# Markers for organizing tests
markers =
    core_concepts: Tests for RDD and core Spark concepts
    dataframes: Tests for DataFrame operations
    data_cleaning: Tests for data transformation and cleaning
    aggregations: Tests for aggregation and window functions
    joins: Tests for join and set operations
    performance: Tests for optimization techniques
    business: Tests for real-world business scenarios
    slow: Tests that take longer to run

# Timeout (in seconds) for tests
timeout = 300

# Maximum verbosity
log_cli = false
log_cli_level = INFO
